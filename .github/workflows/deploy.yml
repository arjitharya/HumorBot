name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bake API key into main.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          key=$(printf '%s' "$GROQ_API_KEY" | tr -d '\n\r')
          if [ -z "$key" ]; then
            echo "::error::GROQ_API_KEY secret is empty or not set"
            exit 1
          fi
          sed -i "s#__GROQ_API_KEY_PLACEHOLDER__#$key#" main.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
